name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
    
    - name: Make gradlew executable
      run: chmod +x ./gradlew
    
    - name: Build with Gradle
      run: ./gradlew build --no-daemon
    
    - name: Create UberJar
      run: ./gradlew packageUberJarForCurrentOS --no-daemon
    
    - name: Upload JAR
      uses: actions/upload-artifact@v4
      with:
        name: OnyxLauncher-jar
        path: app/build/compose/jars/*.jar
        if-no-files-found: warn

  build-linux:
    needs: build
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
    
    - name: Make gradlew executable
      run: chmod +x ./gradlew
    
    - name: Build DEB package
      run: ./gradlew packageDeb --no-daemon
    
    - name: Upload Linux DEB
      uses: actions/upload-artifact@v4
      with:
        name: OnyxLauncher-Linux-deb
        path: app/build/compose/binaries/main/deb/*.deb
        if-no-files-found: warn

  build-windows:
    needs: build
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
    
    - name: Build MSI installer
      run: ./gradlew packageMsi --no-daemon
    
    - name: Upload Windows MSI
      uses: actions/upload-artifact@v4
      with:
        name: OnyxLauncher-Windows-msi
        path: app/build/compose/binaries/main/msi/*.msi
        if-no-files-found: warn

  build-macos:
    needs: build
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
    
    - name: Build DMG package
      run: ./gradlew packageDmg --no-daemon
    
    - name: Upload macOS DMG
      uses: actions/upload-artifact@v4
      with:
        name: OnyxLauncher-macOS-dmg
        path: app/build/compose/binaries/main/dmg/*.dmg
        if-no-files-found: warn
