name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.5'
    
    - name: Build with Gradle
      run: gradle build --no-daemon
    
    - name: Create UberJar
      run: gradle packageUberJarForCurrentOS --no-daemon
    
    - name: Upload JAR
      uses: actions/upload-artifact@v4
      with:
        name: OnyxLauncher-jar
        path: app/build/compose/jars/*.jar
        if-no-files-found: warn

  build-linux:
    needs: build
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.5'
    
    - name: Build DEB package
      run: gradle packageDeb --no-daemon
    
    - name: Upload Linux DEB
      uses: actions/upload-artifact@v4
      with:
        name: OnyxLauncher-Linux-deb
        path: app/build/compose/binaries/main/deb/*.deb
        if-no-files-found: warn

  build-windows:
    needs: build
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.5'
    
    - name: Build EXE package
      run: gradle packageExe --no-daemon
    
    - name: Upload Windows EXE
      uses: actions/upload-artifact@v4
      with:
        name: OnyxLauncher-Windows-exe
        path: app/build/compose/binaries/main/exe/*.exe
        if-no-files-found: warn

  build-macos:
    needs: build
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.5'
    
    - name: Build DMG package
      run: gradle packageDmg --no-daemon
    
    - name: Upload macOS DMG
      uses: actions/upload-artifact@v4
      with:
        name: OnyxLauncher-macOS-dmg
        path: app/build/compose/binaries/main/dmg/*.dmg
        if-no-files-found: warn
